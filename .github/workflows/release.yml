name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_name: git-real.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go mod download

      - name: Build archive
        run: |
          set -euo pipefail
          artifact_name="git-real_${{ matrix.goos }}_${{ matrix.goarch }}"
          archive_name="${artifact_name}.${{ matrix.archive_ext }}"

          mkdir -p "dist/${artifact_name}"

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -o "dist/${artifact_name}/${{ matrix.binary_name }}" ./cmd/git-real

          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            zip -j "dist/${archive_name}" "dist/${artifact_name}/${{ matrix.binary_name }}"
          else
            tar -C dist -czf "dist/${archive_name}" "${artifact_name}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
