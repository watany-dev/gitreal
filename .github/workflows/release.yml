name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # required for cosign keyless signing via OIDC

jobs:
  build-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_name: git-real
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_name: git-real.exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go mod download

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY_NAME: ${{ matrix.binary_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          artifact_name="git-real_${GOOS}_${GOARCH}"
          archive_name="${artifact_name}.${ARCHIVE_EXT}"

          mkdir -p "dist/${artifact_name}"

          version="$(git describe --tags --always --dirty)"
          commit="$(git rev-parse HEAD)"
          date="$(git log -1 --format=%cI)"

          # Pin the build timestamp to the tag commit's author date so that
          # rebuilding from the same source produces a byte-identical binary.
          export SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)"

          go build \
            -trimpath \
            -buildvcs=true \
            -ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}" \
            -o "dist/${artifact_name}/${BINARY_NAME}" \
            ./cmd/git-real

          if [ "${ARCHIVE_EXT}" = "zip" ]; then
            (cd dist && zip -j "${archive_name}" "${artifact_name}/${BINARY_NAME}")
          else
            tar -C dist --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf "dist/${archive_name}" "${artifact_name}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.*
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum git-real_*.tar.gz git-real_*.zip > SHA256SUMS)

      - uses: sigstore/cosign-installer@v3

      - name: Sign checksums with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign-blob \
            --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/git-real_*.tar.gz
            dist/git-real_*.zip
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem
