name: dependency-review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # Initial rollout in warn-only mode: surface license/CVE findings as a PR
      # summary without blocking merges. Tighten to fail-on-severity: high once
      # we've calibrated on real PRs.
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          warn-only: true
          comment-summary-in-pr: always
